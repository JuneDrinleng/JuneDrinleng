<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="June Drinleng - PhD Candidate in Chemistry at Tsinghua University"
    />
    <title>June Drinleng - CV</title>
    <script>
      // Prevent theme flash by applying theme before React loads
      // Also check URL param for cross-site theme sync
      (function () {
        var params = new URLSearchParams(window.location.search);
        var urlTheme = params.get("theme");
        var theme;
        if (urlTheme === "dark" || urlTheme === "light") {
          theme = urlTheme;
          localStorage.setItem("theme", theme);
        } else {
          theme =
            localStorage.getItem("theme") ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
        }
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
