<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="June Drinleng - PhD Candidate in Chemistry at Tsinghua University"
    />
    <title>June Drinleng - CV</title>
    <!-- Preload critical images so they start downloading immediately -->
    <link rel="preload" as="image" href="/assets/profile.jpg" />
    <link
      rel="preload"
      as="image"
      href="/assets/img/cell-rep-phys-sci-2025.jpg"
    />
    <link rel="preload" as="image" href="/assets/img/pnas-2025.png" />
    <link
      rel="preload"
      as="image"
      href="/assets/img/acs-appl-bio-mater-2025.jpeg"
    />
    <script>
      // Prevent theme flash by applying theme before React loads
      // Also check URL param for cross-site theme sync
      (function () {
        var params = new URLSearchParams(window.location.search);
        var urlTheme = params.get("theme");
        var theme;
        var fromTransition = false;
        if (urlTheme === "dark" || urlTheme === "light") {
          theme = urlTheme;
          fromTransition = true;
          localStorage.setItem("theme", theme);
        } else {
          theme =
            localStorage.getItem("theme") ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
        }
        document.documentElement.classList.toggle("dark", theme === "dark");

        // Always inject a loading overlay to prevent content/image flicker
        var bg = theme === "light" ? "#fff" : "#000";
        var dotColor = theme === "light" ? "#000" : "#fff";
        var labelColor =
          theme === "light" ? "rgba(0,0,0,0.5)" : "rgba(255,255,255,0.6)";
        var label = fromTransition ? "Redirecting\u2026" : "Loading\u2026";
        var overlay = document.createElement("div");
        overlay.id = "site-arrival-overlay";
        overlay.setAttribute(
          "style",
          "position:fixed;inset:0;z-index:9999;display:flex;align-items:center;" +
            "justify-content:center;background:" +
            bg +
            ";pointer-events:all;" +
            "transition:opacity 350ms ease;",
        );
        overlay.innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;gap:16px">' +
          '<div style="display:flex;gap:8px">' +
          '<span class="st-dot" style="width:8px;height:8px;border-radius:50%;background:' +
          dotColor +
          '"></span>' +
          '<span class="st-dot" style="width:8px;height:8px;border-radius:50%;background:' +
          dotColor +
          '"></span>' +
          '<span class="st-dot" style="width:8px;height:8px;border-radius:50%;background:' +
          dotColor +
          '"></span>' +
          "</div>" +
          '<p style="color:' +
          labelColor +
          ';font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase;margin:0">' +
          label +
          "</p>" +
          "</div>" +
          "<style>" +
          ".st-dot{animation:st-dp 1s ease-in-out infinite}" +
          ".st-dot:nth-child(2){animation-delay:.15s}" +
          ".st-dot:nth-child(3){animation-delay:.3s}" +
          "@keyframes st-dp{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}" +
          "</style>";
        document.body.appendChild(overlay);
        window.__siteArrivalOverlay = true;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
