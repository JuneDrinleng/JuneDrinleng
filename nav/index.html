<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>June Drinleng · 导航</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      type="image/png"
      href="../assets/favicon.ico"
      sizes="32x32"
    />
    <script
      defer
      src="https://umami.junedrinleng.com/script.js"
      data-website-id="6b8456c6-57c8-4379-964e-12433d938243"
    ></script>
  </head>
  <body>
    <!-- 顶部导航 -->
    <header class="site-header">
      <span class="header-logo">June<span>.</span>Drinleng</span>
      <span class="header-tag">个人导航</span>
    </header>

    <main class="main">
      <!-- Hero -->
      <div class="hero">
        <span class="hero-eyebrow">My Space</span>
        <h1 class="hero-title">Hi, I'm June&nbsp;👋</h1>
        <p class="hero-sub">欢迎来到我的个人导航页，这里汇聚了我的网站与小工具，方便随时访问。</p>
      </div>

      <!-- 主站与工具 -->
      <p class="section-label">网站 & 工具</p>
      <div class="cards-grid">

        <!-- 主页 -->
        <a
          class="nav-card"
          href="https://junedrinleng.github.io/"
          target="_blank"
          rel="noopener noreferrer"
          style="--card-color:#6366f1;--card-color2:#8b5cf6;--card-icon-bg:#eef2ff;"
        >
          <div class="card-icon">🏠</div>
          <div class="card-title">个人主页</div>
          <div class="card-desc">June Drinleng 的个人网站，了解我的经历与研究方向。</div>
          <div class="card-footer">
            <span class="card-tag">Website</span>
            <span class="card-arrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </span>
          </div>
        </a>

        <!-- 歌单分析 -->
        <a
          class="nav-card"
          href="https://junedrinleng.github.io/playlist/"
          target="_blank"
          rel="noopener noreferrer"
          style="--card-color:#10b981;--card-color2:#06b6d4;--card-icon-bg:#ecfdf5;"
        >
          <div class="card-icon">🎵</div>
          <div class="card-title">歌单分析系统</div>
          <div class="card-desc">可视化展示听歌数据，包含近期风格分析、平台分布、时间趋势等多维度统计。</div>
          <div class="card-footer">
            <span class="card-tag" style="background:#ecfdf5;color:#10b981;">Music</span>
            <span class="card-arrow">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </span>
          </div>
        </a>

      </div>
    </main>

    <footer>
      <p>
        ©2025 June Drinleng |
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">京ICP备2025124159号</a>
      </p>
    </footer>
  </body>
</html>
